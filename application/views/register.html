<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../../src/css/style.css">
</head>
<body>
        <div class="container justify-content-center d-flex mt-5 flex-column align-items-center">
            <div class="header  mb-2 ">
                <p style="float: none;margin-top: 40px;color: #EFC81A;font-size: 30px;font-weight: bold;">Recipe...</p>
              </div>
              <div class="header  mb-2">
                <p style="float: none;margin-top: 40px;color: #EFC81A;font-size: 30px;font-weight: bold;">Let's Get Started !</p>
              </div>
              <div class="header  mb-2">
                <p style="float: none;margin-top: 20px;margin-bottom: 50px;font-family: 'Poppins', sans-serif;font-size: 20px;opacity: 50%;">Create new account to access all features</p>
              </div>
              <div style="width: 400px;">
              <form>
                <!-- Email input -->
                <div class="form-outline mb-3">
                    <label class="form-label" for="form2Example1">Name</label>
                    <input type="text" id="form2Example1" class="form-control" placeholder="Name" required/>
                </div>

                <div class="form-outline mb-3">
                    <label class="form-label" for="form2Example1">Email address</label>
                    <input type="email" id="form2Example1" class="form-control" placeholder="Enter Email Address" required/>
                </div>
              
                <!-- Password input -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="form2Example2">Password</label>
                    <input type="password" id="form2Example2" class="form-control" placeholder="Password" required/>                 
                </div>
              
                <!-- 2 column grid layout for inline styling -->
                <div class="row mb-3">
                  <div class="col d-flex">
                    <!-- Checkbox -->
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" style="background-color: #EFC81A;" value="" id="form2Example31" checked required/>
                      <label class="form-check-label" for="form2Example31"> I Agree to terms and conditions </label>
                    </div>
                  </div>
                </div>
              
                <div class="d-grid gap-2 mx-auto">
                  <button type="submit" class="btn btn-primary" style="background-color: #EFC81A;" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    Register Account
                  </button>
                </div>
                
              
                <!-- Register buttons -->
                <div class="text-center" style="margin-top: 50px;">
                  <p>Already have account ?<a href="login.html" style="text-decoration: none;color: #EFC81A;"> Log in here</a></p>
                </div>
              </form>
            </div>
        </div>
        <!-- Button trigger modal -->


<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body" style="padding: 60px 60px 60px 60px;">
      <p class="modal-title fs-2 text-lg-center" style="color: #EFC81A;font-weight: bold;" id="exampleModalLabel">You're all set!</p>
      <p style="margin-top: 20px; font-weight: bold; font-size: 13px; margin-top: 50px;text-align: center;">please check your account email for verification</p>
      </div>
        <button type="button" class="btn btn-primary" style="width: 75%;margin-left: auto; margin-right: auto;margin-bottom: 30px; background-color: #EFC81A;"  data-bs-dismiss="modal">
          Ok
        </button>
    </div>
  </div>
</div>
</body>
</html>
